<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>Interactive Registration Form</title>
</head>

<body>
  <div class="container-signup-form ">
    <h1>Register</h1>
    <form id="registrationForm" novalidate>
      <div class="form-group-signup">
        <label for="username">Username:</label>
        <input type="text" id="username" name="username" required>
        <span class="error-message" id="usernameError"></span>
      </div>
      <div class="form-group-signup">
        <label for="email">Email:</label>
        <input type="email" id="email" name="email" required>
        <span class="error-message-signup" id="emailError"></span>
      </div>
      <div class="form-group-signup">
        <label for="password">Password:</label>
        <input type="password" id="password" name="password" minlength="8" required>
        <small>Password must be at least 8 characters long, include an uppercase letter, a lowercase letter, and a
          number.</small>
        <span class="error-message-signup" id="passwordError"></span>
      </div>
      <div class="form-group-signup">
        <label for="confirmPassword">Confirm Password:</label>
        <input type="password" id="confirmPassword" name="confirmPassword" minlength="8" required>
        <span class="error-message-signup" id="confirmPasswordError"></span>
      </div>
      <button type="submit" class="signup-button">Register</button>
    </form>
  </div>
  <script src="script.js"></script>
</body>

</html>
